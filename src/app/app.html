<div class="sandbox">
  <header class="sandbox-header">
    <h1>Forecast Hierarchy Web Component</h1>
    <p>&lt;forecast-hierarchy&gt; — configure hierarchy, columns, and data below</p>
  </header>

  <section class="component-section">
    <forecast-hierarchy #fcElement storage-key="forecast-hierarchy"></forecast-hierarchy>
  </section>

  <section class="editors">
    <div class="editor-panel">
      <div class="panel-header">
        <h2>Config (hierarchy + columns)</h2>
        <div class="panel-actions">
          <button class="apply-btn" (click)="applyConfig()">Apply</button>
        </div>
      </div>
      @if (configError) {
        <div class="error-msg">{{ configError }}</div>
      }
      <textarea
        class="json-editor"
        [(ngModel)]="configJson"
        spellcheck="false"
      ></textarea>
    </div>

    <div class="editor-panel">
      <div class="panel-header">
        <h2>Data (flat records)</h2>
        <div class="panel-actions">
          <button class="apply-btn" (click)="applyData()">Apply</button>
        </div>
      </div>
      @if (dataError) {
        <div class="error-msg">{{ dataError }}</div>
      }
      <textarea
        class="json-editor"
        [(ngModel)]="dataJson"
        spellcheck="false"
      ></textarea>
    </div>
  </section>
</div>
